<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background-color: #f8f9fa;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background-color: #f8f9fa;
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.3s;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        .no-records {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Registros de Inscripción</h1>
            <p>Gestiona y visualiza todas las inscripciones registradas</p>
        </header>

        <div class="content">
            <!-- Sección de Formulario -->
            <div class="section">
                <h2>Nuevo Registro</h2>
                <div class="success-message" id="successMessage">¡Inscripción registrada exitosamente!</div>
                <form id="inscriptionForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">Nombre:</label>
                            <input type="text" id="firstName" name="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Apellido:</label>
                            <input type="text" id="lastName" name="lastName" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Correo Electrónico:</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Teléfono:</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="course">Curso:</label>
                            <select id="course" name="course" required>
                                <option value="">Selecciona un curso</option>
                                <option value="Programación Web">Programación Web</option>
                                <option value="JavaScript Avanzado">JavaScript Avanzado</option>
                                <option value="React.js">React.js</option>
                                <option value="Python">Python</option>
                                <option value="Bases de Datos">Bases de Datos</option>
                                <option value="Diseño UI/UX">Diseño UI/UX</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="registrationDate">Fecha de Inscripción:</label>
                            <input type="date" id="registrationDate" name="registrationDate" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="comments">Comentarios:</label>
                        <textarea id="comments" name="comments" rows="3" placeholder="Opcional"></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Registrar Inscripción</button>
                </form>
            </div>

            <!-- Sección de Registros -->
            <div class="section">
                <h2>Lista de Inscripciones</h2>
                <div id="tableContainer">
                    <div class="no-records">No hay registros aún. ¡Crea el primero!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cargar datos del localStorage
        function loadRecords() {
            const records = JSON.parse(localStorage.getItem('inscriptions')) || [];
            return records;
        }

        // Guardar datos en localStorage
        function saveRecords(records) {
            localStorage.setItem('inscriptions', JSON.stringify(records));
        }

        // Renderizar tabla de registros
        function renderTable() {
            const records = loadRecords();
            const tableContainer = document.getElementById('tableContainer');

            if (records.length === 0) {
                tableContainer.innerHTML = '<div class="no-records">No hay registros aún. ¡Crea el primero!</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Correo</th>
                            <th>Teléfono</th>
                            <th>Curso</th>
                            <th>Fecha</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            records.forEach((record, index) => {
                html += `
                    <tr>
                        <td>${record.firstName}</td>
                        <td>${record.lastName}</td>
                        <td>${record.email}</td>
                        <td>${record.phone}</td>
                        <td>${record.course}</td>
                        <td>${record.registrationDate}</td>
                        <td><button class="btn-delete" onclick="deleteRecord(${index})">Eliminar</button></td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            tableContainer.innerHTML = html;
        }

        // Eliminar registro
        function deleteRecord(index) {
            if (confirm('¿Estás seguro de que deseas eliminar este registro?')) {
                const records = loadRecords();
                records.splice(index, 1);
                saveRecords(records);
                renderTable();
            }
        }

        // Manejar envío del formulario
        document.getElementById('inscriptionForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const newRecord = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                course: document.getElementById('course').value,
                registrationDate: document.getElementById('registrationDate').value,
                comments: document.getElementById('comments').value,
                id: Date.now()
            };

            const records = loadRecords();
            records.push(newRecord);
            saveRecords(records);

            // Mostrar mensaje de éxito
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);

            // Limpiar formulario
            this.reset();
            document.getElementById('registrationDate').valueAsDate = new Date();

            // Actualizar tabla
            renderTable();
        });

        // Establecer fecha actual por defecto
        document.getElementById('registrationDate').valueAsDate = new Date();

        // Cargar registros al abrir la página
        renderTable();
    </script>
</body>
</html>
